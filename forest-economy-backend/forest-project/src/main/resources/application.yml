spring:
  application:
    name: forest-project

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/forest_economy}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:YOUR_DB_USERNAME}
    password: ${DB_PASSWORD:YOUR_DB_PASSWORD}

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

forest:
  auth:
    jwt-secret-base64: ${JWT_SECRET_BASE64:}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:2592000000}
